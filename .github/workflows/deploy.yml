name: 🚀 Deploy SPD Indonesia

# Trigger: setiap push ke branch main, atau trigger manual dari GitHub UI
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pastikan tidak ada dua deploy berjalan bersamaan
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: Validasi build ─────────────────────────────────────────────────
  # Jalankan di GitHub's runner dulu — kalau build gagal, deploy tidak jalan.
  validate:
    name: ✅ Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (validasi)
        run: npm run build
        env:
          VITE_API_URL: https://spdindonesia.org/api

  # ── Job 2: Deploy ke server ───────────────────────────────────────────────
  # Hanya jalan kalau Job 1 (validate) berhasil.
  deploy:
    name: 🚢 Deploy to Production
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e   # Berhenti kalau ada command yang gagal

            cd /var/www/spd-website

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing backend dependencies..."
            cd backend
            npm install --omit=dev
            npx prisma db push
            cd ..

            echo "🏗️  Building frontend..."
            npm run build

            echo "🔄 Restarting backend..."
            pm2 restart spd-backend
            pm2 save

            echo "✅ Deploy selesai! $(date '+%Y-%m-%d %H:%M:%S')"
