# /etc/nginx/sites-available/spdindonesia.org
# SPD Indonesia — React SPA (Vite build) + Express backend reverse proxy
#
# Deploy steps:
#   1. cp deploy/nginx-spd.conf /etc/nginx/sites-enabled/spdindonesia.org
#   2. nginx -t && systemctl reload nginx
#
# NOTE: This file includes the Certbot-managed SSL blocks.
# If the TLS cert is renewed or regenerated, re-run:
#   certbot --nginx -d spdindonesia.org -d www.spdindonesia.org
# and copy the updated file back to deploy/nginx-spd.conf.

server {
    server_name spdindonesia.org www.spdindonesia.org;

    # Hide Nginx version from Server response header and error pages.
    server_tokens off;

    root /var/www/spd-website/dist;
    index index.html;

    # ── Upload size (multer accepts files from /api/admin/*) ──────────
    client_max_body_size 25m;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS — tell browsers to always use HTTPS (only honoured when served
    # over TLS, so harmless here; Certbot's 443 block inherits this config).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — restrict resource loading to same origin.
    # 'unsafe-inline' is needed by Vite's production build (module preload
    # scripts). Tighten with nonces if a future build supports it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; media-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # ── Backend API ───────────────────────────────────────────────────
    # NOTE: No trailing slash on proxy_pass — nginx must forward /api/* intact.
    # With a trailing slash, nginx strips the /api/ prefix and every route 404s.
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── User uploads — served directly from filesystem (no Node.js hop) ─
    # Files are stored at backend/uploads/ by multer. Nginx serves them
    # directly so uploads remain available even if the backend restarts.
    # ^~ prevents the static-file regex below from intercepting .png/.pdf
    # before this prefix location can handle them.
    location ^~ /uploads/ {
        alias /var/www/spd-website/backend/uploads/;
        add_header X-Content-Type-Options "nosniff";
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
        access_log off;
        # Security: deny directory listing
        autoindex off;
    }

    # ── Hashed Vite assets — long cache, immutable ────────────────────
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # ── Other static files (fonts, images in public/) ─────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|svg|woff2?|ttf|eot|otf|mp4|webm)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide dotfiles ─────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── TLS — managed by Certbot ──────────────────────────────────────
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/spdindonesia.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/spdindonesia.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── HTTP → HTTPS redirect — managed by Certbot ───────────────────────────────
server {
    if ($host = www.spdindonesia.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = spdindonesia.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name spdindonesia.org www.spdindonesia.org;
    return 404; # managed by Certbot
}
