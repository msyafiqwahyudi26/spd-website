# /etc/nginx/sites-available/spdindonesia.org
# SPD Indonesia — React SPA (Vite build) + Express backend reverse proxy
#
# After editing:
#   sudo ln -sf /etc/nginx/sites-available/spdindonesia.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (HTTPS 443 block + redirect) is added by:
#   sudo certbot --nginx -d spdindonesia.org -d www.spdindonesia.org

server {
    listen 80;
    listen [::]:80;
    server_name spdindonesia.org www.spdindonesia.org;

    root /var/www/spd-website/dist;
    index index.html;

    # ── Upload size (multer accepts files from /api/admin/*) ──────────
    client_max_body_size 25m;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Backend API ───────────────────────────────────────────────────
    # NOTE: No trailing slash on proxy_pass — nginx must forward /api/* intact.
    # With a trailing slash, nginx strips the /api/ prefix and every route 404s.
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── User uploads (served by backend from backend/uploads) ─────────
    location /uploads/ {
        proxy_pass http://localhost:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Hashed Vite assets — long cache, immutable ────────────────────
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # ── Other static files (fonts, images in public/) ─────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|svg|woff2?|ttf|eot|otf|mp4|webm)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide dotfiles ─────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
